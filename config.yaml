llm:
  provider: "gemini"
  api_key: "YOUR_GEMINI_API_KEY_HERE"
  cloud_model: "gemini-2.5-flash"

ollama:
  base_url: "http://localhost:11434"
  api_base: "http://localhost:11434/v1"
  model: "gemma"
  embedding_model: "nomic-embed-text"

memory:
  db_path: "./memory_db"
  collection: "jarvis_memory"
  user_id: "naiteek"

rag:
  data_dir: "./data"
  cache_dir: "./index_cache"
  top_k: 3

execution:
  auto_run: false           # SAFETY: require confirmation before running commands
  allowed_commands: []      # Empty = allow all (with confirmation)
  blocked_commands:         # Never allow these, even with confirmation
    - "rm -rf /"
    - "mkfs"
    - "dd if="
  timeout_seconds: 30

logging:
  enabled: true
  dir: "./logs"


